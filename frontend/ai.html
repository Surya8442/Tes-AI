<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TES-AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
display:flex;
height:100vh;
background:#0f172a;
color:white;
}

/* Sidebar */

.sidebar{
width:240px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar a{
color:#cbd5f5;
text-decoration:none;
margin:10px 0;
display:block;
transition:0.3s;
}

.sidebar a:hover{
color:white;
}

/* Main */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* Header */

.header{
padding:15px 20px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
align-items:center;
}

.header .title{
font-weight:600;
}

/* Chat Area */

.chat{
flex:1;
overflow-y:auto;
padding:30px;
display:flex;
flex-direction:column;
gap:20px;
scroll-behavior:smooth;
}

/* Message */

.msg{
max-width:65%;
padding:14px 18px;
border-radius:14px;
line-height:1.5;
animation: fadeIn 0.3s ease;
}

.user{
background:#2563eb;
align-self:flex-end;
}

.bot{
background:#1e293b;
align-self:flex-start;
}

/* Typing */

.typing{
font-size:12px;
opacity:0.6;
margin-left:5px;
}

/* Input */

.input-box{
display:flex;
padding:15px;
border-top:1px solid #1e293b;
background:#020617;
}

.input-box input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:#1e293b;
color:white;
}

.input-box button{
margin-left:10px;
padding:12px 20px;
background:#38bdf8;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.input-box button:hover{
background:#0ea5e9;
}

/* Animation */

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div>
<h2>TES-AI</h2>

<a href="/home">🏠 Home</a>
<a href="/ai">🤖 AI Chat</a>
<a href="/logout">🚪 Logout</a>
</div>

<div style="font-size:12px; opacity:0.6;">
AI Powered DevOps
</div>

</div>

<!-- Main -->

<div class="main">

<div class="header">
<div class="title">🤖 TES-AI Assistant</div>
<div>Online ●</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-box">
<input type="text" id="msg" placeholder="Ask DevOps, Docker, Kubernetes...">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<script>

function sendMsg(){

let input = document.getElementById("msg");
let message = input.value.trim();

if(message === "") return;

let chat = document.getElementById("chat");

// user message
chat.innerHTML += `<div class="msg user">${message}</div>`;

// typing indicator
let typing = document.createElement("div");
typing.className = "typing";
typing.innerText = "TES-AI is typing...";
chat.appendChild(typing);

chat.scrollTop = chat.scrollHeight;

// backend call
fetch('/ask_ai', {
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({msg:message})
})
.then(res=>res.json())
.then(data=>{

typing.remove();

chat.innerHTML += `<div class="msg bot">${data.reply}</div>`;
chat.scrollTop = chat.scrollHeight;

});

input.value = "";

}

// Enter key support
document.getElementById("msg").addEventListener("keypress", function(e){
if(e.key === "Enter"){
sendMsg();
}
});

</script>

</body>
</html>
