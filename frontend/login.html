<!DOCTYPE html>
<html>
<head>
<title>TES-AI Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #bbdefb, #90caf9);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.box {
    width: 360px;
    padding: 35px;
    border-radius: 18px;
    background: #ffffff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    text-align: center;
    animation: floatBox 0.8s ease;
}

/* Title */
h2 {
    color: #1565c0;
    margin-bottom: 25px;
}

/* Input group */
.input-group {
    position: relative;
    margin: 20px 0;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #cfd8dc;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
}

/* Focus effect */
input:focus {
    border-color: #42a5f5;
    box-shadow: 0 0 6px rgba(66,165,245,0.4);
}

/* Floating labels */
.input-group label {
    position: absolute;
    left: 12px;
    top: 12px;
    color: #90a4ae;
    font-size: 14px;
    pointer-events: none;
    transition: 0.3s;
    background: #fff;
    padding: 0 4px;
}

/* Label animation */
input:focus + label,
input:valid + label {
    top: -8px;
    font-size: 11px;
    color: #1e88e5;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #42a5f5, #1e88e5);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 5px 15px rgba(30,136,229,0.4);
}

/* Error */
p {
    color: #e53935;
    font-size: 14px;
}

/* Link */
a {
    color: #1e88e5;
    text-decoration: none;
    font-weight: bold;
}

a:hover {
    text-decoration: underline;
}

/* Animation */
@keyframes floatBox {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="box">
<h2>TES-AI Login</h2>

<form action="/login_user" method="POST">

    <div class="input-group">
        <input name="email" type="email" required>
        <label>Email</label>
    </div>

    <div class="input-group">
        <input name="password" type="password" required>
        <label>Password</label>
    </div>

    <button type="submit">Login</button>

</form>

{% if error %}
    <p style="margin-top:10px;">
        {{ error }}
    </p>
{% endif %}

<p style="color:#555;">New user? <a href="/signup">Signup</a></p>

</div>

</body>
</html>
