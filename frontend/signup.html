<!DOCTYPE html>
<html>
<head>
<title>TES-AI Signup</title>
<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #bbdefb, #e1f5fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.box {
    background: #ffffff;
    padding: 40px 35px;
    width: 360px;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    text-align: center;
    animation: fadeUp 0.7s ease;
}

/* Title */
h2 {
    color: #1565c0;
    margin-bottom: 25px;
    font-size: 24px;
}

/* Inputs */
input {
    width: 100%;
    padding: 13px;
    margin: 12px 0;
    border-radius: 10px;
    border: 1px solid #cfe3ff;
    outline: none;
    font-size: 14px;
    background: #f8fbff;
    transition: 0.3s;
}

/* Input focus */
input:focus {
    border-color: #42a5f5;
    box-shadow: 0 0 8px rgba(66,165,245,0.3);
    background: #ffffff;
    transform: scale(1.01);
}

/* Button */
button {
    width: 100%;
    padding: 13px;
    margin-top: 10px;
    background: linear-gradient(135deg, #42a5f5, #1e88e5);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

/* Button hover */
button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(30,136,229,0.3);
}

/* Error */
p {
    font-size: 14px;
}

/* Link */
a {
    color: #1e88e5;
    font-weight: bold;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* Animation */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>
<body>

<div class="box">
<h2>TES-AI Signup</h2>

<form action="/register" method="POST">
    <input name="username" placeholder="Username" required>
    <input name="email" type="email" placeholder="Email" required>
    <input name="password" type="password" placeholder="Password" required>

    <button type="submit">Signup</button>
</form>
{% if error %}
    <p style="color:red; margin-top:10px;">
        {{ error }}
    </p>
{% endif %}

<p>Already have account? <a href="/login">Login</a></p>
</div>

</body>
</html>
