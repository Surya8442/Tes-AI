<!DOCTYPE html>
<html>
<head>
<title>TES-AI Login</title>
<style>
body {
    font-family: Arial;
    background: #e3f2fd;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 30px;
    width: 350px;
    border-radius: 10px;
}
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}
button {
    width: 100%;
    padding: 10px;
    background: #1976d2;
    color: white;
    border: none;
}
</style>
</head>
<body>

<div class="box">
<h2>TES-AI Login</h2>

<form action="/login_user" method="POST">
    <input name="email" type="email" placeholder="Email" required>
    <input name="password" type="password" placeholder="Password" required>

    <button type="submit">Login</button>
    
</form>
{% if error %}
    <p style="color:red; margin-top:10px;">
        {{ error }}
    </p>
{% endif %}

<p>New user? <a href="/signup">Signup</a></p>
</div>

</body>
</html>
